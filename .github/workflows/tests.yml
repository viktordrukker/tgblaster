name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN. Jobs that need write must opt in
# explicitly. Prevents a compromised dep / action from abusing token scope.
permissions:
  contents: read

jobs:
  pytest:
    name: pytest (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -x --tb=short

  docker-build:
    name: docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build app image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: false
          load: false
          tags: tgblaster:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: check for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan for API hash / session leaks
        run: |
          # Fail if a tracked file contains a hex32 that looks like a
          # real Telegram api_hash AND isn't on the allow-list of
          # well-known documentation placeholders. The allow-list:
          #   * `0123456789abcdef0123456789abcdef` — the walk-the-alphabet
          #     placeholder repeated by docs and README examples.
          #   * lines inside the scripts/pre-push-check.sh allow-list
          #     itself (meta-reference).
          #
          # Heuristic — not cryptographically sound, but catches the
          # common "pasted real creds into README" mistake which is the
          # whole reason for this job.
          HITS=$(grep -rEn '[a-f0-9]{32}' \
              --exclude-dir=.git \
              --exclude-dir=.github \
              --exclude-dir=docs \
              --exclude='.env.example' \
              --exclude='*.lock' \
              --exclude='requirements.txt' \
              . \
              | grep -viE '(0123456789abcdef0123456789abcdef|example|your_api_hash|pre-push-check\.sh)' \
              | grep -vE ':(LICENSE|SECURITY)\.md' \
              || true)
          if [ -n "$HITS" ]; then
              echo "::error::Possible api_hash leak (not on allow-list):"
              echo "$HITS"
              exit 1
          fi
          echo "✓ no un-whitelisted hex32 tokens found"
